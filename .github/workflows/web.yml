name: Vue App

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'

permissions:
  contents: read
  packages: read

jobs:
  ci:
    name: Build vue app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/community-web
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Disable local .npmrc for CI
      run: |
        if [ -f .npmrc ]; then mv .npmrc .npmrc.local-ci; fi

    - name: Setup GitVersion
      uses: gittools/actions/gitversion/setup@v4
      with:
        versionSpec: '6.4.0'

    - name: Determine Version
      id: version_step
      uses: gittools/actions/gitversion/execute@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22.x'
        cache: 'npm'
        cache-dependency-path: web/community-web/package-lock.json
        registry-url: 'https://npm.pkg.github.com'
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies
      run: npm ci
          
    - name: Build app
      run: npm run build
      env:
        VITE_APP_VERSION: ${{ steps.version_step.outputs.semVer }}

    - name: Create zip archive
      run: |
        cd dist
        zip -r "$GITHUB_WORKSPACE/community-web-dist.zip" .
        
    - name: Upload dist artifact
      uses: actions/upload-artifact@v6
      with:
        name: community-web-dist
        path: community-web-dist.zip
        retention-days: 30

  release:
    name: Create release
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    needs: ci
    runs-on: ubuntu-latest
    environment: production-release
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Disable local .npmrc for CI
        run: |
          if [ -f .npmrc ]; then mv .npmrc .npmrc.local-ci; fi
      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.4.0'

      - name: Determine Version
        id: version_step
        uses: gittools/actions/gitversion/execute@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: web/community-web/package-lock.json
          registry-url: 'https://npm.pkg.github.com'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Download dist artifact
        uses: actions/download-artifact@v6
        with:
          name: community-web-dist
          path: community-web-dist

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create -t "${{ steps.version_step.outputs.semVer }}-web" --generate-notes "v${{ steps.version_step.outputs.semVer }}-web" community-web-dist/community-web-dist.zip#package
