name: Vue App

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'

permissions:
  contents: read
  packages: read

jobs:
  ci:
    name: Build vue app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/community-web
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        cache-dependency-path: web/community-web/package-lock.json

    - name: Install dependencies
      run: npm ci
      
    - name: Build app
      run: npm run build

    - name: Create zip archive
      run: zip -r "$GITHUB_WORKSPACE/community-web-dist.zip" dist/
        
    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: community-web-dist
        path: community-web-dist.zip
        retention-days: 30

  release:
    name: Create release
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    needs: ci
    runs-on: ubuntu-latest
    environment: production-release
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: web/community-web/package-lock.json
      - name: Get version
        id: vars
        working-directory: web/community-web
        run: |
          echo "webreleasever=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: community-web-dist
          path: community-web-dist

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create -t "${{ steps.vars.outputs.webreleasever }}" --generate-notes "v${{ steps.vars.outputs.webreleasever }}" community-web-dist/community-web-dist.zip#package
